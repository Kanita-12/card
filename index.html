<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lopyuuuu</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 90%; /* Menggunakan persentase agar fleksibel */
      max-width: 600px; 
      text-align: center;
      padding: 30px;
      animation: fadeIn 2s ease;
      z-index: 2;
      box-sizing: border-box; /* Agar padding tidak merusak lebar */
    }
    
    /* Responsive adjustment untuk Mobile */
    @media (max-width: 600px) {
      .card {
        padding: 20px;
      }
      .card h1 {
        font-size: 1.8em !important; /* Judul proporsional di HP */
      }
      .card p {
        font-size: 1em !important;
      }
      .slideshow {
        height: 200px !important; /* Tinggi slideshow lebih pendek di HP */
      }
      .heart {
        display: none; /* Sembunyikan hiasan samping di layar kecil agar tidak berantakan */
      }
    }

    .card h1 {
      color: #e75480;
      font-size: 2.5em;
      margin-bottom: 15px;
      animation: heartbeat 2s infinite;
    }
    .card p {
      color: #555;
      margin: 12px 0;
      font-size: 1.2em;
      animation: slideUp 2s ease;
    }
    .slideshow {
      position: relative;
      width: 100%;
      height: 300px;
      margin: 20px 0;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f9f9f9;
    }
    .slideshow img {
      position: absolute;
      max-width: 100%;
      max-height: 100%;
      object-fit: cover; /* Diubah ke cover agar foto memenuhi frame */
      opacity: 0;
      transition: opacity 1s ease-in-out;
      margin: auto;
    }
    .slideshow img.active {
      opacity: 1;
    }
    button {
      background: #e75480;
      color: #fff;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 20px;
      animation: bounce 2s infinite;
      font-size: 1em;
    }
    button:hover {
      background: #ff99aa;
    }

    @keyframes fadeIn { from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);} }
    @keyframes heartbeat { 0%, 100% {transform: scale(1);} 50% {transform: scale(1.05);} }
    @keyframes slideUp { from {transform: translateY(30px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }
    @keyframes bounce { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-5px);} }

    /* Heart shape */
    .heart {
      position: absolute;
      width: 20px; height: 20px;
      background: #e75480;
      transform: rotate(-45deg);
      animation: float 6s infinite ease-in-out;
    }
    .heart::before, .heart::after {
      content: ""; position: absolute;
      width: 20px; height: 20px;
      background: #e75480; border-radius: 50%;
    }
    .heart::before { top: -10px; left: 0; }
    .heart::after { left: 10px; top: 0; }
    @keyframes float {
      0%, 100% { transform: rotate(-45deg) translateY(0); opacity: 1; }
      50% { transform: rotate(-45deg) translateY(-30px); opacity: 0.7; }
    }

    .heart.left1 { left: 5%; top: 20%; }
    .heart.left2 { left: 8%; top: 40%; }
    .heart.left3 { left: 12%; top: 60%; }
    .heart.right1 { right: 5%; top: 25%; }
    .heart.right2 { right: 8%; top: 45%; }
    .heart.right3 { right: 12%; top: 65%; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Selamat Ulang Tahun ke-19!</h1>
    <p>23 April 2026</p>
    <div class="slideshow">
      <img src="./src/mylove1.jpeg" class="active" alt="Foto 1">
      <img src="./src/mylove2.jpeg" alt="Foto 2">
      <img src="./src/mylove3.jpeg" alt="Foto 3">
      <img src="./src/mylove4.jpeg" alt="Foto 4">
      <img src="./src/mylove5.jpeg" alt="Foto 5">
    </div>
    <p>Semoga hari-harimu penuh cinta, tawa, dan kebahagiaan.  
       Kamu adalah melodi indah dalam hidupku ❤️</p>
    
    <audio id="bgMusic" loop>
      <source src="./src/love.mp3" type="audio/mpeg">
    </audio>
    <br>
    <button onclick="playMusicAndReload()">Sentuh untuk Kejutan ❤️</button>
  </div>

  <div class="heart left1"></div>
  <div class="heart left2"></div>
  <div class="heart left3"></div>
  <div class="heart right1"></div>
  <div class="heart right2"></div>
  <div class="heart right3"></div>

  <script>
    // Slideshow otomatis
    let slides = document.querySelectorAll('.slideshow img');
    let index = 0;
    setInterval(() => {
      slides[index].classList.remove('active');
      index = (index + 1) % slides.length;
      slides[index].classList.add('active');
    }, 4000); // Dipercepat ke 4 detik agar lebih dinamis

    const music = document.getElementById('bgMusic');

    // Fungsi untuk memulai musik saat user berinteraksi
    function playMusicAndReload() {
      music.play();
      // Memberikan feedback visual bahwa musik jalan
      document.querySelector('button').innerText = "Lopyuuu! ❤️";
    }

    // Trik Autoplay: Coba jalankan musik saat layar disentuh pertama kali
    document.body.addEventListener('touchstart', function() {
        music.play();
    }, { once: true });
    
    document.body.addEventListener('click', function() {
        music.play();
    }, { once: true });
  </script>
</body>
</html>
