<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Lopyuuuu</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 600px; /* diperbesar dari 400px */
      text-align: center;
      padding: 30px; /* padding lebih besar */
      animation: fadeIn 2s ease;
      z-index: 2;
    }
    .card h1 {
      color: #e75480;
      font-size: 2.5em; /* judul lebih besar */
      margin-bottom: 15px;
      animation: heartbeat 2s infinite;
    }
    .card p {
      color: #555;
      margin: 12px 0;
      font-size: 1.2em; /* teks lebih besar */
      animation: slideUp 2s ease;
    }
    .slideshow {
      position: relative;
      width: 100%;
      height: 300px; /* lebih tinggi untuk card besar */
      margin: 20px 0;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .slideshow img {
      position: absolute;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      margin: auto;
    }
    .slideshow img.active {
      opacity: 1;
    }
    audio {
      margin-top: 15px;
      animation: fadeIn 3s ease;
    }
    button {
      background: #e75480;
      color: #fff;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 20px;
      animation: bounce 2s infinite;
      font-size: 1em;
    }
    button:hover {
      background: #ff99aa;
    }
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
    @keyframes heartbeat {
      0%, 100% {transform: scale(1);}
      50% {transform: scale(1.1);}
    }
    @keyframes slideUp {
      from {transform: translateY(30px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }
    @keyframes bounce {
      0%, 100% {transform: translateY(0);}
      50% {transform: translateY(-5px);}
    }

    /* Heart shape */
    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #e75480;
      transform: rotate(-45deg);
      animation: float 6s infinite ease-in-out;
    }
    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: #e75480;
      border-radius: 50%;
    }
    .heart::before {
      top: -10px;
      left: 0;
    }
    .heart::after {
      left: 10px;
      top: 0;
    }
    @keyframes float {
      0% { transform: rotate(-45deg) translateY(0); opacity: 1; }
      50% { transform: rotate(-45deg) translateY(-30px); opacity: 0.7; }
      100% { transform: rotate(-45deg) translateY(0); opacity: 1; }
    }

    /* Posisi hearts */
    .heart.left1 { left: 5%; top: 20%; }
    .heart.left2 { left: 8%; top: 40%; }
    .heart.left3 { left: 12%; top: 60%; }
    .heart.left4 { left: 6%; top: 80%; }
    .heart.left5 { left: 10%; top: 10%; }

    .heart.right1 { right: 5%; top: 25%; }
    .heart.right2 { right: 8%; top: 45%; }
    .heart.right3 { right: 12%; top: 65%; }
    .heart.right4 { right: 6%; top: 85%; }
    .heart.right5 { right: 10%; top: 15%; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Selamat Ulang Tahun ke-19!</h1>
    <p>23 April 2026</p>
    <div class="slideshow">
      <img src="./src/mylove1.jpeg" class="active" alt="Foto 1">
      <img src="./src/mylove2.jpeg" alt="Foto 2">
      <img src="./src/mylove3.jpeg" alt="Foto 3">
      <img src="./src/mylove4.jpeg" alt="Foto 4">
      <img src="./src/mylove5.jpeg" alt="Foto 5">
    </div>
    <p>Semoga hari-harimu penuh cinta, tawa, dan kebahagiaan.  
       Kamu adalah melodi indah dalam hidupku ❤️</p>
    <audio id="bgMusic" autoplay loop>
      <source src="./src/love.mp3" type="audio/mpeg">
      Browsermu tidak mendukung audio.
    </audio>
    <br>
    <button onclick="location.reload()">Ulangi Animasi</button>
  </div>

  <!-- 10 hearts di samping card -->
  <div class="heart left1"></div>
  <div class="heart left2"></div>
  <div class="heart left3"></div>
  <div class="heart left4"></div>
  <div class="heart left5"></div>
  <div class="heart right1"></div>
  <div class="heart right2"></div>
  <div class="heart right3"></div>
  <div class="heart right4"></div>
  <div class="heart right5"></div>

  <script>
    // Slideshow otomatis dengan fade
    let slides = document.querySelectorAll('.slideshow img');
    let index = 0;
    setInterval(() => {
      slides[index].classList.remove('active');
      index = (index + 1) % slides.length;
      slides[index].classList.add('active');
    }, 10000);

    // Pastikan musik autoplay saat halaman dibuka
    window.addEventListener('load', () => {
      const music = document.getElementById('bgMusic');
      music.play().catch(() => {
        console.log("Autoplay dibatasi browser, tekan play manual.");
      })
    });
  </script>
</body>
</html>
