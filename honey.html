<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kartu Ulang Tahun 19</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 400px;
      text-align: center;
      padding: 20px;
      animation: fadeIn 2s ease;
    }
    .card h1 {
      color: #e75480;
      font-size: 2em;
      margin-bottom: 10px;
      animation: heartbeat 2s infinite;
    }
    .card p {
      color: #555;
      margin: 10px 0;
      animation: slideUp 2s ease;
    }
    .slideshow {
      position: relative;
      width: 100%;
      height: 220px;
      margin: 15px 0;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .slideshow img {
      position: absolute;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain; /* gambar tetap proporsional */
      opacity: 0;
      transition: opacity 1s ease-in-out;
      margin: auto;
    }
    .slideshow img.active {
      opacity: 1;
    }
    audio {
      margin-top: 10px;
      animation: fadeIn 3s ease;
    }
    button {
      background: #e75480;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 15px;
      animation: bounce 2s infinite;
    }
    button:hover {
      background: #ff99aa;
    }
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
    @keyframes heartbeat {
      0%, 100% {transform: scale(1);}
      50% {transform: scale(1.1);}
    }
    @keyframes slideUp {
      from {transform: translateY(30px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }
    @keyframes bounce {
      0%, 100% {transform: translateY(0);}
      50% {transform: translateY(-5px);}
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Selamat Ulang Tahun ke-19!</h1>
    <p>23 April 2026</p>
    <div class="slideshow">
      <img src="/src/mylove1.jpeg" class="active" alt="Foto 1">
      <img src="/src/mylove2.jpeg" alt="Foto 2">
      <img src="/src/mylove3.jpeg" alt="Foto 3">
    </div>
    <p>Semoga hari-harimu penuh cinta, tawa, dan kebahagiaan.  
       Kamu adalah melodi indah dalam hidupku ❤️</p>
    <audio autoplay controls>
      <source src="/src/love.mp3" type="audio/mpeg">
      Browsermu tidak mendukung audio.
    </audio>
    <br>
    <button onclick="location.reload()">Ulangi Animasi</button>
  </div>

  <script>
    // Slideshow otomatis dengan fade
    let slides = document.querySelectorAll('.slideshow img');
    let index = 0;
    setInterval(() => {
      slides[index].classList.remove('active');
      index = (index + 1) % slides.length;
      slides[index].classList.add('active');
    }, 10000); // ganti gambar tiap 10 detik
  </script>
</body>
</html>
